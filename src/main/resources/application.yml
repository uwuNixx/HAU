jwt:
  secret-key: ${JWT_SECRET:labhau-default-secret-key-min-32-characters}
  access-token-life-minutes: ${JWT_EXPIRED:60}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: labHAU
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:labhau_db}
    username: ${DB_USER:labhau}
    password: ${DB_PASSWORD:labhau_pass}
  jpa:
    open-in-view: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/db.changelog-master.yaml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO
